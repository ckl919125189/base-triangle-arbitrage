<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Triangle Arbitrage Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .profit-positive { color: #10b981; }
    .profit-negative { color: #ef4444; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // API Base URL
    const API_BASE = window.location.port === '3001' ? 'http://localhost:3001/api' : '/api';
    
    // Token icons (placeholder)
    const TOKEN_ICONS = {
      ETH: '🔷',
      WETH: '🔷',
      USDC: '💵',
      USDT: '💰',
      DAI: '🟡',
      CBETH: '⚡',
    };
    
    // App Component
    function App() {
      const [prices, setPrices] = useState({});
      const [opportunities, setOpportunities] = useState([]);
      const [stats, setStats] = useState({ totalProfit: 0, totalTrades: 0, lastUpdate: null });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 5000);
        return () => clearInterval(interval);
      }, []);
      
      const fetchData = async () => {
        try {
          const [pricesRes, statsRes] = await Promise.all([
            fetch(`${API_BASE}/prices`).catch(() => ({ json: () => ({}) })),
            fetch(`${API_BASE}/stats`).catch(() => ({ json: () => ({}) }))
          ]);
          
          const pricesData = await pricesRes.json();
          const statsData = await statsRes.json();
          
          setPrices(pricesData);
          setStats(statsData);
          
          // Calculate opportunities from prices
          if (Object.keys(pricesData).length > 0) {
            const opps = calculateOpportunities(pricesData);
            setOpportunities(opps);
          }
          
          setLoading(false);
        } catch (err) {
          setError(err.message);
          setLoading(false);
        }
      };
      
      const calculateOpportunities = (priceData) => {
        // Mock triangle arbitrage calculation
        const pairs = [
          { tokenA: 'ETH', tokenB: 'USDC', price: prices['ETH/USDC'] || 3200 },
          { tokenA: 'ETH', tokenB: 'USDT', price: prices['ETH/USDT'] || 3198 },
          { tokenA: 'USDC', tokenB: 'USDT', price: prices['USDC/USDT'] || 1.001 },
        ];
        
        // Simple triangular arbitrage detection
        const opportunities = [];
        if (pairs.length >= 3) {
          const profit = (pairs[0].price / pairs[1].price - 1) * 100;
          if (Math.abs(profit) > 0.1) {
            opportunities.push({
              path: ['ETH', 'USDC', 'USDT', 'ETH'],
              profit: profit.toFixed(4),
              volume: '10,000',
              timestamp: Date.now()
            });
          }
        }
        return opportunities;
      };
      
      return (
        <div className="container mx-auto px-4 py-8">
          {/* Header */}
          <header className="mb-8">
            <h1 className="text-4xl font-bold mb-2">🔺 Base Triangle Arbitrage</h1>
            <p className="text-gray-400">Real-time monitoring dashboard</p>
          </header>
          
          {/* Stats Cards */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <StatCard title="Total Profit" value={`$${stats.totalProfit.toFixed(2)}`} icon="💰" />
            <StatCard title="Total Trades" value={stats.totalTrades} icon="📊" />
            <StatCard title="Active Opportunities" value={opportunities.length} icon="🎯" />
            <StatCard 
              title="Last Update" 
              value={stats.lastUpdate ? new Date(stats.lastUpdate).toLocaleTimeString() : '--'} 
              icon="🔄" 
            />
          </div>
          
          {/* Main Content */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Prices */}
            <div className="card rounded-xl p-6">
              <h2 className="text-xl font-semibold mb-4">📈 Token Prices</h2>
              {loading ? (
                <div className="pulse">Loading prices...</div>
              ) : (
                <div className="space-y-3">
                  {Object.entries(prices).map(([pair, price]) => (
                    <div key={pair} className="flex justify-between items-center p-3 bg-white/5 rounded-lg">
                      <span className="flex items-center gap-2">
                        <span>{TOKEN_ICONS[pair.split('/')[0]] || '🪙'}</span>
                        {pair}
                      </span>
                      <span className="font-mono">${parseFloat(price).toFixed(4)}</span>
                    </div>
                  ))}
                  {Object.keys(prices).length === 0 && (
                    <p className="text-gray-400">Connect wallet to view prices</p>
                  )}
                </div>
              )}
            </div>
            
            {/* Opportunities */}
            <div className="card rounded-xl p-6">
              <h2 className="text-xl font-semibold mb-4">🎯 Arbitrage Opportunities</h2>
              {loading ? (
                <div className="pulse">Scanning...</div>
              ) : opportunities.length > 0 ? (
                <div className="space-y-3">
                  {opportunities.map((opp, i) => (
                    <div key={i} className="p-4 bg-white/5 rounded-lg border border-green-500/30">
                      <div className="flex justify-between mb-2">
                        <span className="font-mono text-sm">{opp.path.join(' → ')}</span>
                        <span className={parseFloat(opp.profit) > 0 ? 'profit-positive' : 'profit-negative'}>
                          {opp.profit}%
                        </span>
                      </div>
                      <div className="flex justify-between text-sm text-gray-400">
                        <span>Volume: ${opp.volume}</span>
                        <button className="text-blue-400 hover:text-blue-300">Execute →</button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <p className="text-gray-400">No opportunities detected</p>
              )}
            </div>
          </div>
          
          {/* Recent Trades */}
          <div className="card rounded-xl p-6 mt-6">
            <h2 className="text-xl font-semibold mb-4">📜 Recent Trades</h2>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="text-left text-gray-400 border-b border-white/10">
                    <th className="pb-3">Time</th>
                    <th className="pb-3">Path</th>
                    <th className="pb-3">Amount</th>
                    <th className="pb-3">Profit</th>
                    <th className="pb-3">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {[].map((trade, i) => (
                    <tr key={i} className="border-b border-white/5">
                      <td className="py-3">{trade.time}</td>
                      <td className="py-3 font-mono text-sm">{trade.path}</td>
                      <td className="py-3">${trade.amount}</td>
                      <td className={trade.profit >= 0 ? 'profit-positive' : 'profit-negative'}>
                        {trade.profit >= 0 ? '+' : ''}{trade.profit}
                      </td>
                      <td className="py-3">
                        <span className={`px-2 py-1 rounded text-xs ${trade.status === 'Success' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                          {trade.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                  {[].length === 0 && (
                    <tr>
                      <td colSpan="5" className="py-4 text-center text-gray-400">No trades yet</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
          
          {/* Error Display */}
          {error && (
            <div className="mt-4 p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
              Error: {error}
            </div>
          )}
        </div>
      );
    }
    
    function StatCard({ title, value, icon }) {
      return (
        <div className="card rounded-xl p-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-gray-400 text-sm">{title}</p>
              <p className="text-2xl font-bold mt-1">{value}</p>
            </div>
            <span className="text-3xl">{icon}</span>
          </div>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
